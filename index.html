<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prove AI v13</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Sarabun',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:#f1f5f9;
    overflow:hidden;
}

.app-container{
    display:flex;
    width:100%;
    height:100%;
}

/* LEFT */
.left-panel{
    width:70%;
    display:flex;
    flex-direction:column;
    padding:12px;
}

.meeting-box{
    flex:1;
    background:#0f172a;
    border-radius:16px;
    overflow:hidden;
    border:2px solid #cbd5e1;
}

iframe{
    width:100%;
    height:100%;
    border:0;
}

.start-screen{
    color:white;
    text-align:center;
    padding-top:20%;
}

/* RIGHT */
.right-panel{
    width:30%;
    display:flex;
    flex-direction:column;
    background:white;
}

.chat-header{
    background:#1e1b4b;
    color:white;
    text-align:center;
    padding:18px;
}

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#f8fafc;
}

.msg{
    max-width:90%;
    padding:12px;
    border-radius:14px;
    white-space:pre-wrap;
}

.msg.ai{
    background:#e0e7ff;
    align-self:flex-start;
}

.msg.user{
    background:#1e1b4b;
    color:white;
    align-self:flex-end;
}

.chat-input-zone{
    display:flex;
    gap:10px;
    padding:12px;
    border-top:1px solid #eee;
}

#userInput{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ddd;
}

button{
    border:none;
    border-radius:20px;
    padding:10px 16px;
    cursor:pointer;
}

.send-btn{
    background:#1e1b4b;
    color:white;
}

/* CONTROL */
.control{
    padding:12px;
    background:white;
    border-top:1px solid #ddd;
    display:flex;
    gap:10px;
}

.btn{
    background:#2563eb;
    color:white;
}

.copy{
    background:#10b981;
}

/* MOBILE */
@media(max-width:768px){
    .app-container{
        flex-direction:column;
    }
    .left-panel,.right-panel{
        width:100%;
        height:50%;
    }
}
</style>
</head>

<body>

<div class="app-container">

<!-- LEFT -->
<div class="left-panel">

    <div class="meeting-box" id="screen">
        <div class="start-screen">
            <h2>🎥 Prove AI Meeting</h2>
            <p>กดเริ่มประชุม Jitsi</p>
        </div>
    </div>

    <div class="control">
        <button class="btn" id="startJitsi">🔄 Start Meeting</button>
        <button class="copy" id="copyLink">📋 Copy Link</button>
    </div>

</div>

<!-- RIGHT -->
<div class="right-panel">

    <div class="chat-header">
        🤖 Prove AI
    </div>

    <div class="chat-body" id="chatBox">
        <div class="msg ai">พร้อมช่วยวิเคราะห์เอกสารและประชุม</div>
    </div>

    <div class="chat-input-zone">
        <input id="userInput" placeholder="ถาม AI...">
        <button class="send-btn" id="sendBtn">ส่ง</button>
    </div>

</div>

</div>

<script>
let currentMeetingUrl = "";

/* CHAT */
function addMsg(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chatBox").appendChild(div);
    document.getElementById("chatBox").scrollTop = 999999;
}

/* AI (mock) */
document.getElementById("sendBtn").onclick = () => {
    const input = document.getElementById("userInput");
    if(!input.value) return;

    addMsg(input.value,"user");

    addMsg("กำลังวิเคราะห์...", "ai");

    setTimeout(()=>{
        addMsg("ระบบ AI พร้อมใช้งาน", "ai");
    },800);

    input.value="";
};

/* JITSI */
document.getElementById("startJitsi").onclick = () => {

    const room = "ProveAI-" + Date.now();
    currentMeetingUrl = "https://meet.jit.si/" + room;

    document.getElementById("screen").innerHTML = `
        <iframe
            src="${currentMeetingUrl}#config.prejoinPageEnabled=false"
            allow="camera; microphone; fullscreen; display-capture; autoplay"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
        ></iframe>
    `;

    addMsg(
`📡 AI แจ้งกรรมการ

🔗 เข้าประชุม:
${currentMeetingUrl}`,
"ai");

    navigator.clipboard.writeText(currentMeetingUrl).catch(()=>{});
};

/* COPY */
document.getElementById("copyLink").onclick = async () => {
    if(!currentMeetingUrl){
        addMsg("ยังไม่มีลิงก์ประชุม","ai");
        return;
    }

    await navigator.clipboard.writeText(currentMeetingUrl);
    addMsg("📋 copy link แล้ว","ai");
};

</script>

</body>
</html>
