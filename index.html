<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prove AI v5</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Sarabun',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f1f5f9;
}

.app-container{
    display:flex;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* LEFT */

.left-panel{
    width:70%;
    min-width:280px;
    display:flex;
    flex-direction:column;
    padding:15px;
    background:#f8fafc;
    transition:none;
}

.meeting-box{
    flex:1;
    background:#0f172a;
    border-radius:15px;
    overflow:hidden;
    margin-bottom:15px;
    border:2px solid #cbd5e1;
    position:relative;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

.control-panel{
    background:white;
    padding:15px;
    border-radius:15px;
}

.btn-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.btn{
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.btn:hover{
    opacity:.9;
}

.btn-webex{
    background:#10b981;
}

.btn-jitsi{
    background:#3b82f6;
}

.btn-file{
    background:#64748b;
}

.btn-record{
    background:#ef4444;
}

.btn-stop{
    background:#4b5563;
}

/* DIVIDER */

#divider{
    width:10px;
    background:#94a3b8;
    cursor:col-resize;
    flex-shrink:0;
    position:relative;
    transition:background .2s;
}

#divider:hover{
    background:#2563eb;
}

#divider.locked{
    background:#16a34a;
}

/* RIGHT */

.right-panel{
    width:30%;
    min-width:280px;
    display:flex;
    flex-direction:column;
    background:white;
    transition:none;
}

.chat-header{
    background:#1a237e;
    color:white;
    padding:20px;
    text-align:center;
}

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#f8f9fa;
}

.msg{
    padding:12px;
    border-radius:15px;
    max-width:90%;
    word-wrap:break-word;
    line-height:1.5;
}

.msg.ai{
    background:#e8eaf6;
    color:#1a237e;
    align-self:flex-start;
}

.msg.user{
    background:#1a237e;
    color:white;
    align-self:flex-end;
}

.chat-input-zone{
    display:flex;
    gap:10px;
    padding:15px;
    background:white;
    border-top:1px solid #eee;
}

#userInput{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:1px solid #ddd;
    outline:none;
}

.send-btn{
    border:none;
    border-radius:25px;
    background:#1a237e;
    color:white;
    padding:0 20px;
    cursor:pointer;
}

.status{
    font-size:12px;
    margin-top:10px;
    color:#64748b;
}

/* MOBILE */

@media(max-width:768px){

    .app-container{
        flex-direction:column;
    }

    .left-panel{
        width:100%!important;
        height:55%;
    }

    .right-panel{
        width:100%!important;
        height:45%;
    }

    #divider{
        width:100%;
        height:8px;
        cursor:row-resize;
    }

    .btn-row{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="app-container">

    <!-- LEFT -->

    <div class="left-panel">

        <div class="meeting-box" id="screen">

            <div style="color:white;text-align:center;padding-top:20%;">

                <h2>🎥 ระบบประชุมตรวจรับพัสดุ</h2>

                <p style="opacity:.6;">
                    กดเริ่ม Jitsi เพื่อประชุม
                </p>

            </div>

        </div>

        <div class="control-panel">

            <div class="btn-row">

                <button
                class="btn btn-webex"
                onclick="window.open(prompt('วางลิงก์ Webex'),'_blank')">
                    🎥 Webex
                </button>

                <button
                class="btn btn-jitsi"
                id="startJitsi">
                    🔄 Jitsi
                </button>

                <button
                class="btn btn-file"
                onclick="document.getElementById('fileInput').click()">
                    📁 เอกสาร
                </button>

            </div>

            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">

                <button
                class="btn btn-record"
                id="recOn">
                    🎙️ อัดเสียง
                </button>

                <button
                class="btn btn-stop"
                id="recOff"
                disabled>
                    ⏹️ หยุด
                </button>

                <input
                type="file"
                id="fileInput"
                style="display:none"
                accept=".txt,.pdf">

            </div>

            <div class="status" id="dragStatus">
                🔓 Divider ปลดล็อก — ลากปรับหน้าจอได้
            </div>

        </div>

    </div>

    <!-- DIVIDER -->

    <div id="divider"></div>

    <!-- RIGHT -->

    <div class="right-panel">

        <div class="chat-header">

            <h3>🤖 Prove AI</h3>

            <p style="font-size:12px;opacity:.7;">
                Hybrid Procurement Assistant
            </p>

        </div>

        <div class="chat-body" id="chatBox">

            <div class="msg ai">
                สวัสดีครับ พร้อมช่วยตรวจระเบียบพัสดุครับ
            </div>

        </div>

        <div class="chat-input-zone">

            <input
            type="text"
            id="userInput"
            placeholder="ถาม AI...">

            <button
            class="send-btn"
            id="sendBtn">
                ส่ง
            </button>

        </div>

    </div>

</div>

<script type="module">

let mediaRecorder;
let audioChunks = [];
let context = "";

let dividerLocked = false;
let isDragging = false;

const leftPanel =
 document.querySelector('.left-panel');

const rightPanel =
 document.querySelector('.right-panel');

const divider =
 document.getElementById('divider');

const appContainer =
 document.querySelector('.app-container');

const dragStatus =
 document.getElementById('dragStatus');

/* AI */

async function runChat(){

    const input =
     document.getElementById('userInput');

    const val =
     input.value.trim();

    if(!val) return;

    addMsg(val,'user');

    input.value='';

    const loading =
     addMsg('กำลังคิด... 🧠','ai');

    try{

        const response =
         await fetch('/api/chat',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({
                message:val,
                context:context
            })

         });

        const data =
         await response.json();

        loading.remove();

        addMsg(
            data.reply ||
            data.error ||
            'AI ไม่ตอบ',
            'ai'
        );

    }catch(err){

        console.error(err);

        loading.innerText =
         '🚨 ระบบ AI ขัดข้อง';

    }

}

function addMsg(text,type){

    const div =
     document.createElement('div');

    div.className =
     `msg ${type}`;

    div.innerText =
     text;

    const chatBox =
     document.getElementById('chatBox');

    chatBox.appendChild(div);

    chatBox.scrollTop =
     chatBox.scrollHeight;

    return div;

}

/* JITSI */

document.getElementById('startJitsi')
.onclick=()=>{

    const room =
     'Phrae-' + Date.now();

    document.getElementById('screen')
    .innerHTML = `
    <iframe
    src="https://meet.jit.si/${room}"
    allow="camera; microphone; fullscreen;">
    </iframe>
    `;

};

/* RECORD */

document.getElementById('recOn')
.onclick = async()=>{

    const stream =
     await navigator.mediaDevices
     .getUserMedia({audio:true});

    mediaRecorder =
     new MediaRecorder(stream);

    mediaRecorder.ondataavailable =
     e=>audioChunks.push(e.data);

    mediaRecorder.onstop = ()=>{

        const blob =
         new Blob(audioChunks,{
            type:'audio/wav'
         });

        const link =
         document.createElement('a');

        link.href =
         URL.createObjectURL(blob);

        link.download =
         'meeting.wav';

        link.click();

        audioChunks=[];

    };

    mediaRecorder.start();

    document.getElementById('recOn')
    .disabled=true;

    document.getElementById('recOff')
    .disabled=false;

};

document.getElementById('recOff')
.onclick=()=>{

    mediaRecorder.stop();

    document.getElementById('recOn')
    .disabled=false;

    document.getElementById('recOff')
    .disabled=true;

};

/* FILE */

document.getElementById('fileInput')
.onchange = e=>{

    const file =
     e.target.files[0];

    if(!file) return;

    const reader =
     new FileReader();

    reader.onload = r=>{

        context =
         r.target.result;

        addMsg(
            `📁 AI อ่านเอกสาร "${file.name}" แล้ว`,
            'ai'
        );

    };

    reader.onerror = ()=>{

        addMsg(
            '❌ อ่านเอกสารไม่สำเร็จ',
            'ai'
        );

    };

    reader.readAsText(file);

};

/* SEND */

document.getElementById('sendBtn')
.onclick = runChat;

document.getElementById('userInput')
.onkeydown = e=>{

    if(e.key==='Enter'){
        runChat();
    }

};

/* DIVIDER LOCK */

divider.addEventListener(
'dblclick',
()=>{

    dividerLocked =
     !dividerLocked;

    if(dividerLocked){

        divider.classList.add('locked');

        dragStatus.innerText =
         '🔒 Divider ถูกล็อก — หน้าจอคงที่';

    }else{

        divider.classList.remove('locked');

        dragStatus.innerText =
         '🔓 Divider ปลดล็อก — ลากปรับหน้าจอได้';

    }

});

/* DRAG */

divider.addEventListener(
'mousedown',
()=>{

    if(dividerLocked) return;

    isDragging = true;

});

window.addEventListener(
'mouseup',
()=>{

    isDragging = false;

});

window.addEventListener(
'mousemove',
e=>{

    if(!isDragging) return;

    if(window.innerWidth <= 768){

        const total =
         appContainer.clientHeight;

        const topHeight =
         (e.clientY / total) * 100;

        if(
            topHeight > 20 &&
            topHeight < 80
        ){

            leftPanel.style.height =
             topHeight + '%';

            rightPanel.style.height =
             (100-topHeight) + '%';

        }

    }else{

        const total =
         appContainer.clientWidth;

        const leftWidth =
         (e.clientX / total) * 100;

        if(
            leftWidth > 20 &&
            leftWidth < 80
        ){

            leftPanel.style.width =
             leftWidth + '%';

            rightPanel.style.width =
             (100-leftWidth) + '%';

        }

    }

});

</script>

</body>
</html>
