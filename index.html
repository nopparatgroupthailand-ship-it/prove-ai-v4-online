<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prove AI v4.2 - ระบบประชุมจังหวัดแพร่</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body, html { background-color: #f0f2f5; height: 100%; width: 100%; overflow: hidden; }
        
        /* 🧱 ล็อคโครงสร้าง 70:30 ตามที่พี่ต้องการ */
        .app-container { display: flex; width: 100vw; height: 100vh; flex-direction: row; }

        /* ⬅️ ฝั่งซ้าย 70% (ส่วนประชุม) */
        .left-panel { 
            flex: 0 0 70%; 
            padding: 40px; 
            background-color: #f8fafc; 
            border-right: 2px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .header-info { text-align: center; margin-bottom: 30px; }
        .header-info h1 { color: #1a237e; font-size: 2rem; }
        .header-info h2 { color: #3b82f6; }

        .meeting-card { 
            background: white; 
            width: 100%; 
            max-width: 600px; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }

        .webex-btn { 
            width: 100%; 
            padding: 18px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            background-color: #10b981; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-bottom: 20px;
        }

        .config-section { 
            background: #eff6ff; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: left; 
            border: 1px solid #bfdbfe;
        }

        /* ➡️ ฝั่งขวา 30% (ส่วนแชท AI) */
        .right-panel { 
            flex: 0 0 30%; 
            display: flex; 
            flex-direction: column; 
            background-color: #ffffff; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.03);
        }

        .chat-header { padding: 20px; background-color: #1a237e; color: white; text-align: center; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #f8f9fa; }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .msg.ai { align-self: flex-start; background-color: #e8eaf6; color: #1a237e; border-bottom-left-radius: 2px; }
        .msg.user { align-self: flex-end; background-color: #1a237e; color: white; border-bottom-right-radius: 2px; }
        
        .chat-input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        .send-btn { background: #1a237e; color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="left-panel">
            <div class="header-info">
                <h1>🏛️ ระบบประชุมจังหวัดแพร่</h1>
                <h2>โครงการก่อสร้างศูนย์ราชการ (งวดที่ 3)</h2>
                <p>เจ้าหน้าที่: นายสิริวิชญ์ ระงับ</p>
            </div>
            <div class="meeting-card">
                <button class="webex-btn" id="btnOpen">🎥 เข้าสู่ห้องประชุม Webex</button>
                <div class="config-section">
                    <p style="font-weight:bold; color:#1a237e;">⚙️ ตั้งค่าลิงก์ประชุม:</p>
                    <input type="text" id="urlInput" style="width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #cbd5e1;" placeholder="วางลิงก์ Webex ที่นี่...">
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="chat-header"><h3>🤖 Prove AI Specialist</h3></div>
            <div class="chat-messages" id="chatBox">
                <div class="msg ai">สวัสดีครับพี่สิริวิชญ์ ผม Prove AI พร้อมช่วยวิเคราะห์ระเบียบพัสดุแล้วครับ</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="ถามระเบียบพัสดุ...">
                <button class="send-btn" id="btnSend">ส่ง</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // ✅ ใช้ API Key เดิมที่พี่รันผ่าน
        const API_KEY = "AIzaSyD-NGKFKHoCZix9rrFMaNing_w2wARAAGc";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const urlInput = document.getElementById('urlInput');

        // ระบบจำลิงก์ Webex
        urlInput.value = localStorage.getItem('webex_link') || "";
        urlInput.oninput = () => localStorage.setItem('webex_link', urlInput.value);
        document.getElementById('btnOpen').onclick = () => {
            if(urlInput.value) window.open(urlInput.value, "_blank");
            else alert("กรุณาวางลิงก์ Webex ก่อนครับพี่");
        };

        // ระบบแชท AI
        async function handleChat() {
            const text = userInput.value.trim();
            if(!text) return;

            appendMsg(text, 'user');
            userInput.value = "";
            const loading = appendMsg("กำลังวิเคราะห์ระเบียบ... 🧠", 'ai');

            try {
                // เปลี่ยนมาใช้ SDK เพื่อข้ามกำแพงความปลอดภัยของ Vercel
                const result = await model.generateContent(`คุณคือ Prove AI ที่ปรึกษาพัสดุจังหวัดแพร่ ตอบคำถามนี้ให้พี่สิริวิชญ์: ${text}`);
                loading.remove();
                appendMsg(result.response.text(), 'ai');
            } catch (e) {
                loading.innerText = "🚨 ระบบขัดข้องชั่วคราว กรุณาลองใหม่อีกครั้งครับ";
            }
        }

        function appendMsg(t, s) {
            const div = document.createElement('div');
            div.className = `msg ${s}`;
            div.innerText = t;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        document.getElementById('btnSend').onclick = handleChat;
        userInput.onkeydown = (e) => { if(e.key === 'Enter') handleChat(); };
    </script>
</body>
</html>
