<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prove AI STABLE v14</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Sarabun',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f1f5f9;
}

/* MAIN LAYOUT */
.app{
    display:flex;
    width:100%;
    height:100%;
}

/* LEFT (MEETING) */
.left{
    width:70%;
    display:flex;
    flex-direction:column;
    padding:10px;
}

.meeting{
    flex:1;
    background:#0f172a;
    border-radius:14px;
    overflow:hidden;
    border:2px solid #cbd5e1;
}

.meeting iframe{
    width:100%;
    height:100%;
    border:0;
}

/* CONTROL */
.control{
    display:flex;
    gap:10px;
    padding:10px;
    background:white;
    border-radius:12px;
    margin-top:10px;
}

button{
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}

.btn{background:#2563eb;color:white;}
.copy{background:#10b981;color:white;}

/* RIGHT (AI) */
.right{
    width:30%;
    display:flex;
    flex-direction:column;
    background:white;
}

.header{
    background:#1e1b4b;
    color:white;
    text-align:center;
    padding:16px;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#f8fafc;
}

.msg{
    padding:10px;
    border-radius:12px;
    max-width:90%;
    white-space:pre-wrap;
}

.ai{background:#e0e7ff;align-self:flex-start;}
.user{background:#1e1b4b;color:white;align-self:flex-end;}

.input{
    display:flex;
    gap:10px;
    padding:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ddd;
}

.send{
    background:#1e1b4b;
    color:white;
}

/* MOBILE */
@media(max-width:768px){
    .app{
        flex-direction:column;
    }
    .left,.right{
        width:100%;
        height:50%;
    }
}
</style>
</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="left">

    <div class="meeting" id="screen">
        <div style="color:white;text-align:center;padding-top:20%">
            🎥 Prove AI Meeting
        </div>
    </div>

    <div class="control">
        <button class="btn" id="start">🔄 Start</button>
        <button class="copy" id="copy">📋 Copy</button>
    </div>

</div>

<!-- RIGHT -->
<div class="right">

    <div class="header">🤖 Prove AI</div>

    <div class="chat" id="chat">
        <div class="msg ai">AI พร้อม + RAG พร้อมใช้งาน</div>
    </div>

    <div class="input">
        <input id="text" placeholder="ถาม AI...">
        <button class="send" id="send">ส่ง</button>
    </div>

</div>

</div>

<script>

let url="";

/* ===== AI (RESTORE ของจริง) ===== */
send.onclick=async()=>{

    if(!text.value) return;

    add(text.value,"user");

    try{

        const fd=new FormData();
        fd.append("message",text.value);

        const res=await fetch("/api/chat",{
            method:"POST",
            body:fd
        });

        const data=await res.json();

        add(data.reply || "AI ไม่ตอบ","ai");

    }catch(e){
        add("❌ AI error","ai");
    }

    text.value="";
};

/* ===== CHAT UI ===== */
function add(t,type){
    const d=document.createElement("div");
    d.className="msg "+type;
    d.innerText=t;
    chat.appendChild(d);
    chat.scrollTop=999999;
}

/* ===== JITSI (STABLE + MIC FIX) ===== */
start.onclick=()=>{

    const room="ProveAI-"+Date.now();
    url="https://meet.jit.si/"+room;

    screen.innerHTML=`
    <iframe
        src="${url}#config.prejoinPageEnabled=false&config.startWithAudioMuted=false"
        allow="camera; microphone; fullscreen; display-capture; autoplay"
    ></iframe>
    `;

    add("📡 link: "+url,"ai");

};

/* COPY */
copy.onclick=async()=>{

    if(!url){
        add("ยังไม่มีลิงก์","ai");
        return;
    }

    await navigator.clipboard.writeText(url);
    add("📋 copied","ai");
};

</script>

</body>
</html>
