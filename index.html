<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prove AI v13 RESTORE</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Sarabun',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:#f1f5f9;
    overflow:hidden;
}

/* LAYOUT */
.app{
    display:flex;
    width:100%;
    height:100%;
}

/* LEFT */
.left{
    width:70%;
    display:flex;
    flex-direction:column;
    padding:10px;
}

.meeting{
    flex:1;
    background:#0f172a;
    border-radius:16px;
    overflow:hidden;
    position:relative;
}

iframe, video{
    width:100%;
    height:100%;
    border:0;
}

/* DIVIDER (RESTORE DRAG) */
#divider{
    width:8px;
    background:#94a3b8;
    cursor:col-resize;
}

/* RIGHT */
.right{
    width:30%;
    display:flex;
    flex-direction:column;
    background:white;
}

.header{
    background:#1e1b4b;
    color:white;
    text-align:center;
    padding:16px;
}

.chat{
    flex:1;
    overflow:auto;
    padding:10px;
    background:#f8fafc;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.msg{
    padding:10px;
    border-radius:12px;
    max-width:90%;
    white-space:pre-wrap;
}

.ai{background:#e0e7ff;align-self:flex-start;}
.user{background:#1e1b4b;color:white;align-self:flex-end;}

.input{
    display:flex;
    padding:10px;
    gap:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ddd;
}

button{
    border:none;
    border-radius:12px;
    padding:10px 14px;
    cursor:pointer;
}

.send{background:#1e1b4b;color:white;}

/* CONTROL */
.control{
    display:flex;
    gap:10px;
    padding:10px;
    background:white;
    border-top:1px solid #ddd;
}

.btn{background:#2563eb;color:white;}
.copy{background:#10b981;}
.webex{background:#7c3aed;}

/* LINK BOX */
.linkbox{
    padding:10px;
    display:none;
    background:#eff6ff;
    border-top:1px solid #bfdbfe;
}

</style>
</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="left">

    <div class="meeting" id="screen">
        <div style="color:white;text-align:center;padding-top:20%">
            🎥 Prove AI Meeting
        </div>
    </div>

    <div class="control">

        <button class="btn" id="start">Jitsi</button>

        <button class="webex" onclick="openWebex()">Webex</button>

        <input type="file" id="file" hidden>
        <button class="btn" onclick="file.click()">Upload</button>

        <button class="copy" id="copy">Copy Link</button>

    </div>

    <div class="linkbox" id="linkbox">
        🔗 <span id="link"></span>
    </div>

</div>

<div id="divider"></div>

<!-- RIGHT -->
<div class="right">

    <div class="header">🤖 Prove AI (RAG LIVE)</div>

    <div class="chat" id="chat">
        <div class="msg ai">ระบบพร้อมใช้งาน (RAG + Meeting)</div>
    </div>

    <div class="input">
        <input id="text" placeholder="ถาม AI...">
        <button class="send" id="send">ส่ง</button>
    </div>

</div>

</div>

<script>

let url="";
let fileData=null;

/* CHAT REAL RAG */
async function askAI(msg){

    const form = new FormData();
    form.append("message", msg);
    if(fileData) form.append("file", fileData);

    const res = await fetch("/api/chat",{
        method:"POST",
        body:form
    });

    return await res.json();
}

function add(text,type){
    const d=document.createElement("div");
    d.className="msg "+type;
    d.innerText=text;
    chat.appendChild(d);
    chat.scrollTop=999999;
}

/* SEND */
send.onclick=async()=>{

    if(!text.value) return;

    add(text.value,"user");

    add("🧠 กำลังวิเคราะห์ (RAG)...","ai");

    const res = await askAI(text.value);

    add(res.reply || "ไม่มีข้อมูล","ai");

    text.value="";
};

/* FILE */
file.onchange=e=>{
    fileData=e.target.files[0];
    add("📁 โหลดเอกสาร: "+fileData.name,"ai");
};

/* JITSI RESTORE */
start.onclick=()=>{

    const room="AI-"+Date.now();
    url="https://meet.jit.si/"+room;

    screen.innerHTML=`
    <iframe
        src="${url}#config.prejoinPageEnabled=false&config.startWithAudioMuted=false"
        allow="camera; microphone; fullscreen; display-capture; autoplay"
    ></iframe>`;

    linkbox.style.display="block";
    link.innerText=url;

    add("📡 ส่งลิงก์ประชุมแล้ว:\n"+url,"ai");

    navigator.clipboard.writeText(url).catch(()=>{});
};

/* COPY */
copy.onclick=()=>{
    if(!url) return;
    navigator.clipboard.writeText(url);
    add("📋 copied","ai");
};

/* WEBEX */
window.openWebex=()=>{
    const w=prompt("Webex link");
    if(!w) return;
    screen.innerHTML=`<iframe src="${w}" allow="camera; microphone; fullscreen"></iframe>`;
};

/* RESIZE PANEL (RESTORE OLD POWER) */
let drag=false;
divider.onmousedown=()=>drag=true;
window.onmouseup=()=>drag=false;

window.onmousemove=e=>{
    if(!drag) return;
    document.querySelector(".left").style.width=e.clientX+"px";
};

</script>

</body>
</html>
