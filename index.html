<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prove AI v5</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Sarabun',sans-serif;
}

body,html{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f1f5f9;
}

.app-container{
    display:flex;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* LEFT */

.left-panel{
    width:70%;
    min-width:280px;
    display:flex;
    flex-direction:column;
    padding:15px;
    background:#f8fafc;
    transition:width .2s;
}

.meeting-box{
    flex:1;
    background:#0f172a;
    border-radius:15px;
    overflow:hidden;
    margin-bottom:15px;
    border:2px solid #cbd5e1;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

.control-panel{
    background:white;
    padding:15px;
    border-radius:15px;
}

.btn-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.btn{
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.btn-webex{
    background:#10b981;
}

.btn-jitsi{
    background:#3b82f6;
}

.btn-file{
    background:#64748b;
}

.btn-record{
    background:#ef4444;
}

.btn-stop{
    background:#4b5563;
}

/* DIVIDER */

#divider{
    width:8px;
    background:#cbd5e1;
    cursor:col-resize;
}

#divider:hover{
    background:#3b82f6;
}

/* RIGHT */

.right-panel{
    width:30%;
    min-width:280px;
    display:flex;
    flex-direction:column;
    background:white;
    transition:width .2s;
}

.chat-header{
    background:#1a237e;
    color:white;
    padding:20px;
    text-align:center;
}

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#f8f9fa;
}

.msg{
    padding:12px;
    border-radius:15px;
    max-width:90%;
    word-wrap:break-word;
}

.msg.ai{
    background:#e8eaf6;
    color:#1a237e;
    align-self:flex-start;
}

.msg.user{
    background:#1a237e;
    color:white;
    align-self:flex-end;
}

.chat-input-zone{
    display:flex;
    gap:10px;
    padding:15px;
    background:white;
    border-top:1px solid #eee;
}

#userInput{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:1px solid #ddd;
}

.send-btn{
    border:none;
    border-radius:25px;
    background:#1a237e;
    color:white;
    padding:0 20px;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

    .app-container{
        flex-direction:column;
    }

    .left-panel{
        width:100%!important;
        height:55%;
    }

    .right-panel{
        width:100%!important;
        height:45%;
    }

    #divider{
        width:100%;
        height:6px;
        cursor:row-resize;
    }

    .btn-row{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="app-container">

    <!-- LEFT -->

    <div class="left-panel">

        <div class="meeting-box" id="screen">

            <div style="color:white;text-align:center;padding-top:20%;">

                <h2>🎥 ระบบประชุมตรวจรับพัสดุ</h2>

                <p style="opacity:.6;">
                    กดเริ่ม Jitsi เพื่อประชุม
                </p>

            </div>

        </div>

        <div class="control-panel">

            <div class="btn-row">

                <button class="btn btn-webex"
                onclick="window.open(prompt('วางลิงก์ Webex'),'_blank')">
                    🎥 Webex
                </button>

                <button class="btn btn-jitsi"
                id="startJitsi">
                    🔄 Jitsi
                </button>

                <button class="btn btn-file"
                onclick="document.getElementById('fileInput').click()">
                    📁 เอกสาร
                </button>

            </div>

            <div style="display:flex;gap:10px;align-items:center;">

                <button class="btn btn-record"
                id="recOn">
                    🎙️ อัดเสียง
                </button>

                <button class="btn btn-stop"
                id="recOff"
                disabled>
                    ⏹️ หยุด
                </button>

                <input
                type="file"
                id="fileInput"
                style="display:none"
                accept=".txt,.pdf">

            </div>

        </div>

    </div>

    <!-- DIVIDER -->

    <div id="divider"></div>

    <!-- RIGHT -->

    <div class="right-panel">

        <div class="chat-header">

            <h3>🤖 Prove AI</h3>

            <p style="font-size:12px;opacity:.7;">
                RAG Procurement Assistant
            </p>

        </div>

        <div class="chat-body" id="chatBox">

            <div class="msg ai">
                สวัสดีครับ พร้อมช่วยตรวจระเบียบพัสดุครับ
            </div>

        </div>

        <div class="chat-input-zone">

            <input
            type="text"
            id="userInput"
            placeholder="ถาม AI...">

            <button
            class="send-btn"
            id="sendBtn">
                ส่ง
            </button>

        </div>

    </div>

</div>

<script type="module">

let mediaRecorder;
let audioChunks = [];
let context = "";

let isDragging = false;

const leftPanel =
 document.querySelector('.left-panel');

const rightPanel =
 document.querySelector('.right-panel');

const divider =
 document.getElementById('divider');

/* AI */

async function runChat(){

    const input =
     document.getElementById('userInput');

    const val =
     input.value.trim();

    if(!val) return;

    addMsg(val,'user');

    input.value='';

    const loading =
     addMsg('กำลังคิด... 🧠','ai');

    try{

        const response =
         await fetch('/api/chat',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({
                message:val,
                context:context
            })

         });

        const data =
         await response.json();

        loading.remove();

        addMsg(
            data.reply ||
            data.error ||
            'AI ไม่ตอบ',
            'ai'
        );

    }catch(err){

        console.error(err);

        loading.innerText =
         '🚨 ระบบ AI ขัดข้อง';

    }

}

function addMsg(text,type){

    const div =
     document.createElement('div');

    div.className =
     `msg ${type}`;

    div.innerText =
     text;

    const chatBox =
     document.getElementById('chatBox');

    chatBox.appendChild(div);

    chatBox.scrollTop =
     chatBox.scrollHeight;

    return div;

}

/* JITSI */

document.getElementById('startJitsi')
.onclick=()=>{

    const room =
     'Phrae-' + Date.now();

    document.getElementById('screen')
    .innerHTML = `
    <iframe
    src="https://meet.jit.si/${room}"
    allow="camera; microphone; fullscreen;">
    </iframe>
    `;

};

/* RECORD */

document.getElementById('recOn')
.onclick = async()=>{

    const stream =
     await navigator.mediaDevices
     .getUserMedia({audio:true});

    mediaRecorder =
     new MediaRecorder(stream);

    mediaRecorder.ondataavailable =
     e=>audioChunks.push(e.data);

    mediaRecorder.onstop = ()=>{

        const blob =
         new Blob(audioChunks,{
            type:'audio/wav'
         });

        const link =
         document.createElement('a');

        link.href =
         URL.createObjectURL(blob);

        link.download =
         'meeting.wav';

        link.click();

        audioChunks=[];

    };

    mediaRecorder.start();

    document.getElementById('recOn')
    .disabled=true;

    document.getElementById('recOff')
    .disabled=false;

};

document.getElementById('recOff')
.onclick=()=>{

    mediaRecorder.stop();

    document.getElementById('recOn')
    .disabled=false;

    document.getElementById('recOff')
    .disabled=true;

};

/* FILE */

document.getElementById('fileInput')
.onchange = e=>{

    const reader =
     new FileReader();

    reader.onload = r=>{

        context =
         r.target.result;

        addMsg(
            'AI อ่านเอกสารแล้ว',
            'ai'
        );

    };

    reader.readAsText(
        e.target.files[0]
    );

};

/* SEND */

document.getElementById('sendBtn')
.onclick = runChat;

document.getElementById('userInput')
.onkeydown = e=>{

    if(e.key==='Enter'){
        runChat();
    }

};

/* RESIZE */

divider.addEventListener(
'mousedown',
()=>{

    isDragging=true;

});

window.addEventListener(
'mouseup',
()=>{

    isDragging=false;

});

window.addEventListener(
'mousemove',
e=>{

    if(!isDragging) return;

    const total =
     window.innerWidth;

    const leftWidth =
     (e.clientX/total)*100;

    if(
        leftWidth>20 &&
        leftWidth<80
    ){

        leftPanel.style.width =
         leftWidth + '%';

        rightPanel.style.width =
         (100-leftWidth)+'%';

    }

});

</script>

</body>
</html>
