<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prove AI v4 - ระบบประชุมและวิเคราะห์พัสดุจังหวัดแพร่</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        /* 🎨 CSS ล็อคโครงสร้าง 70:30 ตามที่พี่ออกแบบ */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body, html { background-color: #f0f2f5; height: 100%; width: 100%; overflow: hidden; }
        .app-container { display: flex; width: 100vw; height: 100vh; }

        /* ฝั่งซ้าย 70% พื้นที่ประชุม */
        .left-panel { flex: 0 0 70%; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; background-color: #f8fafc; border-right: 2px solid #e2e8f0; }
        .meeting-card { background: white; width: 100%; max-width: 650px; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .webex-btn { width: 100%; padding: 15px; font-weight: bold; background-color: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .webex-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* ฝั่งขวา 30% ผู้ช่วย AI */
        .right-panel { flex: 0 0 30%; display: flex; flex-direction: column; background-color: #ffffff; box-shadow: -5px 0 15px rgba(0,0,0,0.02); }
        .chat-header { padding: 20px; background-color: #1a237e; color: white; text-align: center; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #f8f9fa; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .msg.ai { align-self: flex-start; background-color: #e8eaf6; color: #1a237e; border-bottom-left-radius: 2px; }
        .msg.user { align-self: flex-end; background-color: #1a237e; color: white; border-bottom-right-radius: 2px; }
        
        .chat-input { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .send-btn { background: #1a237e; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="left-panel">
            <h1 style="color:#1a237e; margin-bottom:20px;">🏛️ Prove AI v4 - ระบบประชุมจังหวัดแพร่</h1>
            <div class="meeting-card">
                <button class="webex-btn" id="openWebex">🎥 กดเข้าสู่ห้องประชุม Webex</button>
                <div style="margin-top:20px; background:#eff6ff; padding:15px; border-radius:12px; border:1fr solid #bfdbfe;">
                    <p style="font-size:12px; color:#1a237e; font-weight:bold;">⚙️ ตั้งค่าลิงก์ประชุม:</p>
                    <input type="text" id="webexLink" style="width:100%; padding:8px; margin-top:5px; border-radius:8px; border:1px solid #cbd5e1;" placeholder="วางลิงก์ Webex ที่นี่...">
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="chat-header"><h3>🤖 Prove AI Specialist</h3></div>
            <div class="chat-messages" id="chatBox">
                <div class="msg ai">สวัสดีครับพี่สิริวิชญ์ ผมพร้อมช่วยงานพัสดุแล้วครับ ถามระเบียบได้เลยครับ</div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="พิมพ์ถามตอบ AI ตรงนี้...">
                <button class="send-btn" id="sendBtn">ส่ง</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // ✅ แก้ไขให้ใช้ SDK ที่รองรับการรันบนออนไลน์
        const API_KEY = "AIzaSyD-NGKFKHoCZix9rrFMaNing_w2wARAAGc";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const webexIn = document.getElementById('webexLink');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        // ระบบจำลิงก์ประชุม
        webexIn.value = localStorage.getItem('webex') || "";
        webexIn.oninput = () => localStorage.setItem('webex', webexIn.value);
        document.getElementById('openWebex').onclick = () => window.open(webexIn.value, "_blank");

        // ระบบถามตอบ AI
        async function sendMessage() {
            const text = userInput.value.trim();
            if(!text) return;

            appendMsg(text, 'user');
            userInput.value = "";
            const loading = appendMsg("กำลังประมวลผล... 🧠", 'ai');

            try {
                // เรียกใช้สมอง AI ผ่าน SDK
                const result = await model.generateContent(`คุณคือ Prove AI ผู้เชี่ยวชาญพัสดุจังหวัดแพร่ ตอบคำถามนี้สั้นๆ: ${text}`);
                loading.remove();
                appendMsg(result.response.text(), 'ai');
            } catch (e) {
                loading.innerText = "🚨 เกิดข้อผิดพลาด (กรุณาเช็คอินเทอร์เน็ตครับ)";
            }
        }

        function appendMsg(t, s) {
            const div = document.createElement('div');
            div.className = `msg ${s}`;
            div.innerText = t;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        userInput.onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
