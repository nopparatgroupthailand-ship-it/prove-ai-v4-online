<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prove AI v9</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Sarabun',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f1f5f9;
}

.app-container{
    display:flex;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* LEFT */

.left-panel{
    width:70%;
    min-width:280px;
    display:flex;
    flex-direction:column;
    padding:15px;
    background:#f8fafc;
}

.meeting-box{
    flex:1;
    background:#0f172a;
    border-radius:15px;
    overflow:hidden;
    margin-bottom:15px;
    border:2px solid #cbd5e1;
    position:relative;
}

iframe,
video{
    width:100%;
    height:100%;
    border:none;
}

/* CONTROL */

.control-panel{
    background:white;
    padding:15px;
    border-radius:15px;
}

.btn-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.btn{
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.btn:hover{
    opacity:.9;
}

.btn-webex{
    background:#10b981;
}

.btn-jitsi{
    background:#2563eb;
}

.btn-file{
    background:#64748b;
}

.btn-share{
    background:#7c3aed;
}

.btn-record{
    background:#ef4444;
}

.btn-stop{
    background:#4b5563;
}

.link-box{
    margin-top:10px;
    padding:12px;
    background:#eff6ff;
    border:1px solid #bfdbfe;
    border-radius:10px;
    font-size:13px;
    word-break:break-all;
    display:none;
}

.link-box a{
    color:#1d4ed8;
    text-decoration:none;
    font-weight:bold;
}

/* DIVIDER */

#divider{
    width:10px;
    background:#94a3b8;
    cursor:col-resize;
    flex-shrink:0;
}

#divider:hover{
    background:#2563eb;
}

#divider.locked{
    background:#16a34a;
}

/* RIGHT */

.right-panel{
    width:30%;
    min-width:280px;
    display:flex;
    flex-direction:column;
    background:white;
}

.chat-header{
    background:#1e1b4b;
    color:white;
    padding:20px;
    text-align:center;
}

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#f8fafc;
}

.msg{
    padding:12px;
    border-radius:15px;
    max-width:90%;
    line-height:1.6;
    word-wrap:break-word;
    white-space:pre-wrap;
}

.msg.ai{
    background:#e0e7ff;
    color:#1e1b4b;
    align-self:flex-start;
}

.msg.user{
    background:#1e1b4b;
    color:white;
    align-self:flex-end;
}

.chat-input-zone{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #eee;
    background:white;
}

#userInput{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:1px solid #ddd;
    outline:none;
}

.send-btn{
    border:none;
    border-radius:25px;
    background:#1e1b4b;
    color:white;
    padding:0 20px;
    cursor:pointer;
}

.status{
    margin-top:10px;
    font-size:12px;
    color:#64748b;
}

/* MOBILE */

@media(max-width:768px){

    .app-container{
        flex-direction:column;
    }

    .left-panel{
        width:100%!important;
        height:55%;
    }

    .right-panel{
        width:100%!important;
        height:45%;
    }

    #divider{
        width:100%;
        height:8px;
        cursor:row-resize;
    }

    .btn-row{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="app-container">

    <!-- LEFT -->

    <div class="left-panel">

        <div class="meeting-box" id="screen">

            <div style="color:white;text-align:center;padding-top:20%;">

                <h2>🎥 ระบบประชุมตรวจรับพัสดุ</h2>

                <p style="opacity:.6;">
                    กดเริ่ม Jitsi เพื่อประชุม
                </p>

            </div>

        </div>

        <div class="control-panel">

            <div class="btn-row">

                <button
                class="btn btn-webex"
                onclick="openWebex()">
                    🎥 Webex
                </button>

                <button
                class="btn btn-jitsi"
                id="startJitsi">
                    🔄 Jitsi
                </button>

                <button
                class="btn btn-file"
                onclick="document.getElementById('fileInput').click()">
                    📁 เอกสาร
                </button>

                <button
                class="btn btn-share"
                id="shareScreen">
                    🖥️ แชร์จอ
                </button>

            </div>

            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">

                <button
                class="btn btn-record"
                id="recOn">
                    🎙️ อัดเสียง
                </button>

                <button
                class="btn btn-stop"
                id="recOff"
                disabled>
                    ⏹️ หยุด
                </button>

                <input
                type="file"
                id="fileInput"
                style="display:none"
                accept=".txt,.pdf,.doc,.docx">

            </div>

            <!-- LINK BOX -->

            <div class="link-box" id="meetingLinkBox">
                📡 ลิงก์ประชุม:
                <br><br>

                <a
                id="meetingLink"
                href="#"
                target="_blank">
                </a>

                <br><br>

                ✅ copy ลิงก์แล้ว
            </div>

            <div class="status" id="dragStatus">
                🔓 Divider ปลดล็อก — ลากได้
            </div>

        </div>

    </div>

    <!-- DIVIDER -->

    <div id="divider"></div>

    <!-- RIGHT -->

    <div class="right-panel">

        <div class="chat-header">

            <h3>🤖 Prove AI</h3>

            <p style="font-size:12px;opacity:.7;">
                AI Procurement Assistant
            </p>

        </div>

        <div class="chat-body" id="chatBox">

            <div class="msg ai">
                สวัสดีครับ พร้อมช่วยวิเคราะห์เอกสารและระเบียบพัสดุครับ
            </div>

        </div>

        <div class="chat-input-zone">

            <input
            type="text"
            id="userInput"
            placeholder="ถาม AI...">

            <button
            class="send-btn"
            id="sendBtn">
                ส่ง
            </button>

        </div>

    </div>

</div>

<script type="module">

let mediaRecorder;
let audioChunks = [];

let uploadedFile = null;

let dividerLocked = false;
let isDragging = false;

let currentMeetingUrl = '';

const leftPanel =
 document.querySelector('.left-panel');

const rightPanel =
 document.querySelector('.right-panel');

const divider =
 document.getElementById('divider');

const appContainer =
 document.querySelector('.app-container');

const dragStatus =
 document.getElementById('dragStatus');

/* MESSAGE */

function addMsg(text,type){

    const div =
     document.createElement('div');

    div.className =
     `msg ${type}`;

    div.innerText =
     text;

    const chatBox =
     document.getElementById('chatBox');

    chatBox.appendChild(div);

    chatBox.scrollTop =
     chatBox.scrollHeight;

    return div;

}

/* AI CHAT */

async function runChat(){

    const input =
     document.getElementById('userInput');

    const val =
     input.value.trim();

    if(!val) return;

    addMsg(val,'user');

    input.value='';

    const loading =
     addMsg('🧠 AI กำลังวิเคราะห์...','ai');

    try{

        const formData =
         new FormData();

        formData.append(
            'message',
            val
        );

        if(uploadedFile){

            formData.append(
                'file',
                uploadedFile
            );

        }

        const response =
         await fetch('/api/chat',{

            method:'POST',

            body:formData

         });

        const data =
         await response.json();

        loading.remove();

        addMsg(

            data.reply ||
            data.error ||
            'AI ไม่ตอบ',

            'ai'

        );

    }catch(err){

        console.error(err);

        loading.innerText =
         '🚨 ระบบ AI ขัดข้อง';

    }

}

/* SEND */

document.getElementById('sendBtn')
.onclick = runChat;

document.getElementById('userInput')
.onkeydown = e=>{

    if(e.key==='Enter'){
        runChat();
    }

};

/* FILE */

document.getElementById('fileInput')
.onchange = e=>{

    const file =
     e.target.files[0];

    if(!file) return;

    uploadedFile = file;

    addMsg(
        `📁 โหลดเอกสาร "${file.name}" แล้ว`,
        'ai'
    );

};

/* WEBEX */

function openWebex(){

    const url =
     prompt('วางลิงก์ Webex');

    if(!url) return;

    window.open(
        url,
        '_blank'
    );

}
